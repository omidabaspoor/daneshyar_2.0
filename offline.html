<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آفلاین | دانش‌یار</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #0f1115;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
        }
        
        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: #1a1d24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon svg {
            width: 50px;
            height: 50px;
            fill: #eb7c2a;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        p {
            color: #aaa;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .btn {
            display: inline-block;
            background: #eb7c2a;
            color: #fff;
            border: none;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(235, 124, 42, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .tips {
            margin-top: 40px;
            text-align: right;
            padding: 20px;
            background: #1a1d24;
            border-radius: 12px;
        }
        
        .tips h3 {
            font-size: 14px;
            color: #eb7c2a;
            margin-bottom: 12px;
        }
        
        .tips ul {
            list-style: none;
        }
        
        .tips li {
            color: #888;
            font-size: 13px;
            padding: 6px 0;
            padding-right: 20px;
            position: relative;
        }
        
        .tips li::before {
            content: '•';
            position: absolute;
            right: 0;
            color: #eb7c2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6-6c3.31 0 6 2.69 6 6h-12c0-3.31 2.69-6 6-6zm12-2c0 0 0 0 0 0-.23 0-.46.01-.69.04l-1.62-1.62c1.86-1.6 4.18-2.59 6.74-2.93-.38 2.55-1.4 4.87-2.97 6.74l-1.46-1.46zm-4-4c0 0 0 0 0 0-.28 0-.56.02-.83.07l-1.92-1.92c2.73-.58 5.39.32 7.36 1.85l-1.69 1.69c-1.18-1.18-2.78-1.85-4.52-1.85l1.6 1.6zm-8-8c-5.08 0-9.36 3.68-10.29 8.57l2.86 2.86c.63-3.34 3.52-5.86 7.03-5.86l2.02 2.02c-1.38-.48-2.88-.73-4.47-.73l2.85 2.86z"/>
            </svg>
        </div>
        
        <h1>اتصال اینترنت قطع است</h1>
        <p>برای استفاده از دانش‌یار به اینترنت نیاز دارید. لطفاً اتصال خود را بررسی کنید.</p>
        
        <button class="btn" onclick="window.location.reload()">
            تلاش مجدد
        </button>
        
        <div class="tips">
            <h3>راهنمای عیب‌یابی:</h3>
            <ul>
                <li>وای‌فای یا دیتای موبایل را روشن کنید</li>
                <li>حالت هواپیما را خاموش کنید</li>
                <li>از روشن بودن VPN مطمئن شوید</li>
                <li>بعد از چند لحظه دوباره تلاش کنید</li>
            </ul>
        </div>
    </div>
</body>
</html>

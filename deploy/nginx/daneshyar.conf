# ============================================================
#  دانش‌یار - پیکربندی Nginx
#  مسیر نصب پیشنهادی: /etc/nginx/sites-available/daneshyar.conf
#  سپس:  ln -s /etc/nginx/sites-available/daneshyar.conf /etc/nginx/sites-enabled/
#
#  بهینه‌شده برای:
#   - استریم SSE چت (بدون بافر)
#   - سرور ضعیف ۱ کور / ۱ گیگ
#   - دسترسی با IP (بدون دامنه)
# ============================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # چون دامنه نداری، با IP کار می‌کند. اگر بعداً دامنه گرفتی اینجا بگذار.
    server_name _;

    root /var/www/daneshyar;
    index index.php;

    # حداکثر حجم آپلود (هماهنگ با MAX_UPLOAD_MB + سربار PDF تا 20MB)
    client_max_body_size 22M;
    client_body_timeout 120s;

    # بهینه‌سازی پایه برای سرور ضعیف
    sendfile on;
    etag on;
    keepalive_timeout 20;

    # فشرده‌سازی برای کاهش مصرف پهنای‌باند
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml application/x-font-ttf font/woff2;

    # ---------- امنیت: مسدودسازی فایل‌های حساس ----------
    location ~* /\.(env|git) { deny all; return 404; }
    location ~* /(includes|sql|deploy|android)/ { deny all; return 404; }
    location ~* \.(env|sql|md|py|log|sample)$ { deny all; return 404; }
    location = /install.php { deny all; return 404; }   # بعد از نصب
    location = /migrate.php { deny all; return 404; }

    # ---------- فایل‌های استاتیک با کش طولانی ----------
    location ~* \.(?:css|js|woff2|png|jpg|jpeg|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ---------- استریم SSE چت: بدون بافر، تایم‌اوت بالا ----------
    location = /api/chat.php {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm-daneshyar.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # حیاتی برای SSE: بافرینگ را خاموش کن
        fastcgi_buffering off;
        fastcgi_request_buffering off;
        gzip off;
        chunked_transfer_encoding on;

        # اتصال طولانی برای پاسخ AI (تا ۵ دقیقه)
        fastcgi_read_timeout 320s;
        fastcgi_send_timeout 320s;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- بقیه‌ی فایل‌های PHP ----------
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm-daneshyar.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # جلوگیری از کش طولانی برای فایل‌های کاربری و جلوگیری از اجرای PHP در uploads
    location ^~ /uploads/ {
        add_header Cache-Control "private, no-store, no-cache, must-revalidate";
        location ~ \.php$ { deny all; return 403; }
    }

    # فایل APK نهایی برای دانلود مستقیم
    location ^~ /download/ {
        types { application/vnd.android.package-archive apk; }
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
}

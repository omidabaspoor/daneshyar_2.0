; ============================================================
;  دانش‌یار - PHP-FPM Pool
;  مسیر نصب: /etc/php/8.3/fpm/pool.d/daneshyar.conf
;  (نسخه‌ی PHP را با نسخه‌ی نصب‌شده هماهنگ کن)
;
;  محاسبه برای سرور ۱ کور / ۱ گیگ رم:
;  - هدف واقع‌بینانه: ۴ تا ۸ کاربر همزمان چت
;  - هر چت SSE یک worker را تا انتهای پاسخ AI اشغال می‌کند.
;  - هر worker PHP این پروژه ~۳۵ تا ۵۰ مگابایت می‌گیرد.
;  - روی ۱ گیگ رم، worker زیاد باعث Swap شدید و افت CPU می‌شود.
;  - به‌جای 25 worker، مقدار محافظه‌کارانه‌تر انتخاب شده.
; ============================================================

[daneshyar]
user = www-data
group = www-data

; سوکت یونیکس (سریع‌تر از TCP روی همان ماشین)
listen = /run/php/php8.3-fpm-daneshyar.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; --- مدیریت پویا با سقف امن برای ۱ گیگ رم ---
pm = dynamic
pm.max_children = 10          ; برای ۱ گیگ رم امن‌تر از 25 worker است
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; هر worker بعد از این تعداد درخواست ری‌استارت می‌شود (جلوگیری از نشت حافظه)
pm.max_requests = 200

; اگر همه‌ی workerها پر بودند، درخواست‌های اضافه تا این حد در صف می‌مانند
listen.backlog = 64

; --- تایم‌اوت‌ها (هماهنگ با SSE چت) ---
request_terminate_timeout = 330s

; --- لاگ کندها برای دیباگ ---
slowlog = /var/log/php-daneshyar-slow.log
request_slowlog_timeout = 30s

; --- محدودیت حافظه‌ی هر worker (هماهنگ با api/chat.php) ---
php_admin_value[memory_limit] = 160M
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 22M
php_admin_value[max_execution_time] = 330
php_admin_value[error_log] = /var/log/php-daneshyar-error.log
php_admin_flag[log_errors] = on
php_admin_flag[display_errors] = off

; OPcache برای کاهش مصرف CPU روی ۱ کور
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 64
php_admin_value[opcache.max_accelerated_files] = 4000
php_admin_value[opcache.validate_timestamps] = 1
php_admin_value[opcache.revalidate_freq] = 60

; خروجی بافر را کوچک نگه دار تا SSE روان باشد
php_admin_value[output_buffering] = 0
